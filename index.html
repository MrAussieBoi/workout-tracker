<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PUSH PULL LEGS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --glyph: #ffffff;
    --dim: #555555;
    --accent: #ffffff;
    --push: #ff3c3c;
    --pull: #3caaff;
    --legs: #3cffa0;
    --done: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--glyph);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* GLYPH INTERFACE HEADER */
  .header {
    padding: 48px 24px 24px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dim);
  }

  .dot-grid {
    display: grid;
    grid-template-columns: repeat(4, 6px);
    gap: 4px;
    opacity: 0.3;
  }

  .dot-grid span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--glyph);
    display: block;
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .day-accent {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    position: relative;
    top: -4px;
  }

  .day-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    background: var(--accent-color, #fff);
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    padding: 16px 24px 0;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .tab.active { color: var(--glyph); }
  .tab.push.active { border-color: var(--push); color: var(--push); }
  .tab.pull.active { border-color: var(--pull); color: var(--pull); }
  .tab.legs.active { border-color: var(--legs); color: var(--legs); }

  .tab-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin: 0 auto 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tab.push .tab-dot { background: var(--push); }
  .tab.pull .tab-dot { background: var(--pull); }
  .tab.legs .tab-dot { background: var(--legs); }
  .tab.active .tab-dot { opacity: 1; }

  /* EXERCISE LIST */
  .exercise-list {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .exercise-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, #333);
    border-radius: 12px 0 0 12px;
    transition: width 0.3s;
  }

  .exercise-card.completed {
    background: var(--done);
    border-color: #222;
    opacity: 0.6;
  }

  .exercise-card.completed::before {
    width: 100%;
    opacity: 0.04;
  }

  .ex-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .ex-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
    padding-right: 12px;
  }

  .ex-check {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 11px;
  }

  .exercise-card.completed .ex-check {
    background: var(--card-accent, #fff);
    border-color: var(--card-accent, #fff);
    color: #000;
  }

  .ex-meta {
    display: flex;
    gap: 16px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .meta-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .ex-note {
    margin-top: 8px;
    font-size: 11px;
    color: var(--dim);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 3px;
    padding: 0 24px;
    margin-top: 8px;
  }

  /* BOTTOM STATS */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(10,10,10,0.95);
    border-top: 1px solid var(--border);
    padding: 16px 24px 32px;
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-block { text-align: center; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
  }
  .stat-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .reset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { background: var(--border); color: var(--glyph); }

  .spacer { height: 120px; }

  /* Glyph decoration */
  .glyph-line {
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    margin: 0 24px;
  }

  /* Animate in */
  .exercise-card {
    animation: slideUp 0.3s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">PPL TRACKER</div>
    <div class="dot-grid">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="day-title" id="dayTitle">
    <span class="day-accent" id="dayAccent"></span>PUSH
  </div>
  <div class="day-sub" id="daySub">CHEST · SHOULDERS · TRICEPS</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="day-tabs">
  <div class="tab push active" onclick="switchDay('push')">
    <div class="tab-dot"></div>
    PUSH
  </div>
  <div class="tab pull" onclick="switchDay('pull')">
    <div class="tab-dot"></div>
    PULL
  </div>
  <div class="tab legs" onclick="switchDay('legs')">
    <div class="tab-dot"></div>
    LEGS
  </div>
</div>

<div class="exercise-list" id="exerciseList"></div>
<div class="spacer"></div>

<div class="bottom-bar">
  <div class="stat-block">
    <div class="stat-num" id="doneCount">0</div>
    <div class="stat-lbl">DONE</div>
  </div>
  <div class="stat-block">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-lbl">TOTAL</div>
  </div>
  <div class="stat-block">
    <div class="stat-num" id="pctCount">0%</div>
    <div class="stat-lbl">COMPLETE</div>
  </div>
  <button class="reset-btn" onclick="resetDay()">RESET</button>
</div>

<script>
const days = {
  push: {
    title: 'PUSH',
    sub: 'CHEST · SHOULDERS · TRICEPS',
    color: '#ff3c3c',
    exercises: [
      { name: 'Chest Press', sets: 3, reps: '8–10', weight: '60kg', note: 'Machine station — nail your form first' },
      { name: 'Overhead Press', sets: 3, reps: '10–12', weight: '10–15kg', note: 'Barbell — keep core tight' },
      { name: 'Cable Lateral Raise', sets: 3, reps: '12–15', weight: 'Light', note: 'Low cable, one arm at a time' },
      { name: 'Tricep Pushdown', sets: 3, reps: '10–12', weight: '15kg', note: 'High cable + bar, elbows locked in' },
      { name: 'Overhead Tricep Extension', sets: 2, reps: '12–15', weight: '10kg', note: 'High cable + bar overhead' },
    ]
  },
  pull: {
    title: 'PULL',
    sub: 'BACK · BICEPS · REAR DELTS',
    color: '#3caaff',
    exercises: [
      { name: 'Lat Pulldown', sets: 3, reps: '8–10', weight: '50kg', note: 'High cable + lat bar, chest up' },
      { name: 'Seated Low Row', sets: 3, reps: '10–12', weight: '40kg', note: 'Low cable + bar, squeeze at the end' },
      { name: 'Cable Face Pull', sets: 3, reps: '12–15', weight: 'Light', note: 'High cable + handles, great for shoulders' },
      { name: 'Straight Arm Pulldown', sets: 2, reps: '12–15', weight: '20kg', note: 'High cable + bar, arms straight' },
      { name: 'Cable Bicep Curl', sets: 3, reps: '10–12', weight: '20kg', note: 'Low cable + curl bar' },
      { name: 'Hammer Curl', sets: 2, reps: '12', weight: '10–12kg', note: 'Barbell neutral grip' },
    ]
  },
  legs: {
    title: 'LEGS',
    sub: 'QUADS · HAMSTRINGS · GLUTES · CALVES',
    color: '#3cffa0',
    exercises: [
      { name: 'Barbell Squat', sets: 3, reps: '10–12', weight: '15kg', note: 'Focus on depth and form' },
      { name: 'Romanian Deadlift', sets: 3, reps: '10–12', weight: '15kg', note: 'Slow & controlled, feel the stretch' },
      { name: 'Cable Pull-Through', sets: 3, reps: '12–15', weight: 'Mod', note: 'Low cable + handle, great glute builder' },
      { name: 'Cable Leg Kickback', sets: 3, reps: '12–15', weight: 'Light', note: 'Low cable + ankle strap, each leg' },
      { name: 'Bodyweight Lunges', sets: 3, reps: '12 each', weight: 'BW', note: 'Pause at the bottom for extra burn' },
      { name: 'Calf Raises', sets: 3, reps: '20–25', weight: 'BW', note: 'Single leg if too easy' },
    ]
  }
};

let currentDay = 'push';
let completed = { push: new Set(), pull: new Set(), legs: new Set() };

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab.${day}`).classList.add('active');
  render();
}

function render() {
  const day = days[currentDay];
  const color = day.color;

  document.getElementById('dayTitle').innerHTML = `<span class="day-accent" style="background:${color};box-shadow:0 0 10px ${color}66"></span>${day.title}`;
  document.getElementById('daySub').textContent = day.sub;
  document.getElementById('progressBar').style.width = pct() + '%';
  document.getElementById('progressBar').style.background = color;

  const list = document.getElementById('exerciseList');
  list.innerHTML = '';

  day.exercises.forEach((ex, i) => {
    const done = completed[currentDay].has(i);
    const card = document.createElement('div');
    card.className = 'exercise-card' + (done ? ' completed' : '');
    card.style.setProperty('--card-accent', color);
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="ex-top">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-check">${done ? '✓' : ''}</div>
      </div>
      <div class="ex-meta">
        <div class="meta-item">
          <span class="meta-label">SETS</span>
          <span class="meta-val">${ex.sets}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">REPS</span>
          <span class="meta-val">${ex.reps}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">WEIGHT</span>
          <span class="meta-val" style="font-size:16px;padding-top:3px">${ex.weight}</span>
        </div>
      </div>
      ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
    `;
    card.onclick = () => toggle(i);
    list.appendChild(card);
  });

  updateStats();
}

function toggle(i) {
  if (completed[currentDay].has(i)) {
    completed[currentDay].delete(i);
  } else {
    completed[currentDay].add(i);
  }
  render();
}

function pct() {
  const total = days[currentDay].exercises.length;
  return total ? Math.round((completed[currentDay].size / total) * 100) : 0;
}

function updateStats() {
  const total = days[currentDay].exercises.length;
  const done = completed[currentDay].size;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('pctCount').textContent = pct() + '%';
}

function resetDay() {
  completed[currentDay].clear();
  render();
}

render();
</script>
</body>
</html>
